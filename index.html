<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>LoL Versions Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #c89b3c;
      --blue:    #4cafef;
      --dark:    #080c14;
      --panel:   #0d1526cc;
      --border:  #1a2d4a;
    }

    body {
      background: var(--dark);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 14px 24px 10px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #05090f 0%, transparent 100%);
      flex-shrink: 0;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .logo-icon {
      width: 32px; height: 32px;
      fill: var(--gold);
    }
    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.15rem;
      font-weight: 900;
      letter-spacing: .18em;
      color: var(--gold);
      text-shadow: 0 0 18px #c89b3c66;
      text-transform: uppercase;
    }
    header h1 span { color: var(--blue); }

    /* ── MAP CONTAINER ── */
    .map-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* World map via SVG background */
    .map-wrap::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 50%, #0d1f3a 0%, transparent 70%),
        url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg') center/contain no-repeat;
      opacity: .28;
      filter: brightness(.8) saturate(.4) hue-rotate(200deg);
    }

    /* Grid lines */
    .map-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(74,143,209,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,143,209,.07) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* ── REGION PINS ── */
    .pin {
      position: absolute;
      transform: translate(-50%, -100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
      animation: fadeIn .5s ease both;
    }

    .pin-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      text-align: center;
      backdrop-filter: blur(8px);
      position: relative;
      min-width: 68px;
      box-shadow: 0 4px 24px #000a, 0 0 0 1px #ffffff08;
    }
    .pin-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .pin-region {
      font-family: 'Orbitron', sans-serif;
      font-size: .58rem;
      letter-spacing: .12em;
      color: var(--gold);
      font-weight: 700;
      line-height: 1.2;
    }
    .pin-version {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--blue);
      text-shadow: 0 0 10px #4cafef88;
      line-height: 1.3;
    }
    .pin-version.loading { color: #3a4a5a; animation: pulse 1.2s ease infinite; }

    /* Stem + dot */
    .pin-stem {
      width: 1px; height: 10px;
      background: linear-gradient(to bottom, var(--gold), transparent);
    }
    .pin-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 8px var(--blue), 0 0 16px #4cafef55;
    }

    /* ── STATUS BAR ── */
    footer {
      flex-shrink: 0;
      padding: 7px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .72rem;
      color: #3a5070;
      border-top: 1px solid #0d1a2a;
      letter-spacing: .06em;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #2a9d4f;
      box-shadow: 0 0 6px #2a9d4f;
      animation: pulse 2s ease infinite;
    }
    #status-text { margin-left: 2px; }
    .last-updated { margin-left: auto; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -90%); }
      to   { opacity: 1; transform: translate(-50%, -100%); }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .4; }
    }
  </style>
</head>
<body>

<header>
  <svg class="logo-icon" viewBox="0 0 100 100">
    <polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5" fill="none" stroke="currentColor" stroke-width="6"/>
    <polygon points="50,20 80,35 80,65 50,80 20,65 20,35" fill="none" stroke="currentColor" stroke-width="3" opacity=".4"/>
    <circle cx="50" cy="50" r="12" fill="currentColor"/>
  </svg>
  <h1>League of Legends &mdash; <span>Live Patch Versions</span></h1>
</header>

<div class="map-wrap" id="map"></div>

<footer>
  <div class="status-dot"></div>
  <span id="status-text">Fetching patch data…</span>
  <span class="last-updated" id="last-updated"></span>
</footer>

<script>
  // Regions with approximate equirectangular positions (% of map area)
  // x = (lng + 180) / 360   y = (90 - lat) / 180
  const regions = [
    { code: "euw",  name: "EUW",  lat: 48.85,  lng:   2.35 },
    { code: "eune", name: "EUNE", lat: 52.23,  lng:  21.01 },
    { code: "na",   name: "NA",   lat: 40.71,  lng: -74.00 },
    { code: "kr",   name: "KR",   lat: 37.56,  lng: 126.97 },
    { code: "jp",   name: "JP",   lat: 35.68,  lng: 139.69 },
    { code: "br",   name: "BR",   lat: -15.78, lng: -47.93 },
    { code: "lan",  name: "LAN",  lat: 19.43,  lng: -99.13 },
    { code: "las",  name: "LAS",  lat: -34.60, lng: -58.38 },
    { code: "oce",  name: "OCE",  lat: -33.86, lng: 151.20 },
    { code: "tr",   name: "TR",   lat: 39.93,  lng:  32.86 },
    { code: "ru",   name: "RU",   lat: 55.75,  lng:  37.61 },
  ];

  function latLngToPercent(lat, lng) {
    // Standard equirectangular projection, clamped to visible map bounds
    const x = ((lng + 180) / 360) * 100;
    const y = ((90 - lat) / 180) * 100;
    return { x, y };
  }

  function createPin(region) {
    const pos = latLngToPercent(region.lat, region.lng);
    const pin = document.createElement('div');
    pin.className = 'pin';
    pin.id = `pin-${region.code}`;
    pin.style.left = `${pos.x}%`;
    pin.style.top  = `${pos.y}%`;
    pin.innerHTML = `
      <div class="pin-card">
        <div class="pin-region">${region.name}</div>
        <div class="pin-version loading" id="ver-${region.code}">…</div>
      </div>
      <div class="pin-stem"></div>
      <div class="pin-dot"></div>
    `;
    return pin;
  }

  async function getVersion(code) {
    const res = await fetch(`https://ddragon.leagueoflegends.com/realms/${code}.json`);
    const data = await res.json();
    return data.v;
  }

  async function init() {
    const map = document.getElementById('map');
    const statusText = document.getElementById('status-text');

    // Render all pins immediately with loading state
    regions.forEach(r => map.appendChild(createPin(r)));

    // Fetch versions in parallel
    let done = 0;
    await Promise.all(regions.map(async r => {
      try {
        const v = await getVersion(r.code);
        const el = document.getElementById(`ver-${r.code}`);
        if (el) {
          el.textContent = v;
          el.classList.remove('loading');
        }
      } catch {
        const el = document.getElementById(`ver-${r.code}`);
        if (el) { el.textContent = 'N/A'; el.classList.remove('loading'); el.style.color = '#e05050'; }
      }
      done++;
      statusText.textContent = `Loading… ${done}/${regions.length} regions`;
    }));

    statusText.textContent = `All ${regions.length} regions loaded`;
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  init();
</script>
</body>
</html>
