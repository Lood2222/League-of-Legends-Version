<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>LoL — Patch Versions</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060a12;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid #1a2d4a;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c89b3c, transparent);
    }
    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: .15em;
      color: #c89b3c;
      text-shadow: 0 0 20px #c89b3c44;
    }
    header h1 span { color: #4cafef; }

    .map-outer {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 60%, #0b1e3a22, #060a12);
    }

    .map-inner {
      position: relative;
      flex-shrink: 0;
    }

    .world-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      opacity: 0.22;
      filter: hue-rotate(205deg) saturate(0.45) brightness(0.75);
      pointer-events: none;
    }

    .pins-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    footer {
      flex-shrink: 0;
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .72rem;
      color: #3a5070;
      border-top: 1px solid #0d1a2a;
      letter-spacing: .06em;
    }
    .sdot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #2a9d4f; box-shadow: 0 0 6px #2a9d4f;
    }
    .sdot.loading { animation: pulse 1s ease infinite; background: #c89b3c; box-shadow: 0 0 6px #c89b3c; }

    /* Version-changed flash: applied via JS on the SVG text element's parent group */
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes newpatch { 0%{opacity:0} 15%{opacity:1} 85%{opacity:1} 100%{opacity:0} }
  </style>
</head>
<body>

<header>
  <h1>League of Legends — <span>Live Patch Versions</span></h1>
</header>

<div class="map-outer" id="outer">
  <div class="map-inner" id="mapinner">

    <img class="world-img"
         src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/World_map_-_low_resolution.svg/2000px-World_map_-_low_resolution.svg.png"
         alt=""/>

    <svg class="pins-layer"
         viewBox="0 0 1000 500"
         preserveAspectRatio="none"
         xmlns="http://www.w3.org/2000/svg">

      <defs>
        <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-s" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="1.2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-gold" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Grid -->
      <g stroke="#4a8fd1" stroke-opacity="0.08" stroke-width="0.6" stroke-dasharray="4 6">
        <line x1="0" y1="83"  x2="1000" y2="83"/>
        <line x1="0" y1="167" x2="1000" y2="167"/>
        <line x1="0" y1="250" x2="1000" y2="250" stroke-opacity="0.15"/>
        <line x1="0" y1="333" x2="1000" y2="333"/>
        <line x1="0" y1="417" x2="1000" y2="417"/>
        <line x1="167" y1="0" x2="167" y2="500"/>
        <line x1="333" y1="0" x2="333" y2="500"/>
        <line x1="500" y1="0" x2="500" y2="500" stroke-opacity="0.15"/>
        <line x1="667" y1="0" x2="667" y2="500"/>
        <line x1="833" y1="0" x2="833" y2="500"/>
      </g>

      <g id="markers"></g>
    </svg>
  </div>
</div>

<footer>
  <div class="sdot" id="sdot"></div>
  <span id="status-text">Cargando versiones…</span>
  <span style="margin-left:auto;color:#2a4a3a" id="next-refresh"></span>
  <span style="margin-left:16px" id="last-updated"></span>
</footer>

<script>
  // ── Resize: keep map-inner at 2:1 ratio ──────────────────────────────────
  const outer = document.getElementById('outer');
  const inner = document.getElementById('mapinner');
  function syncSize() {
    const w = Math.min(outer.clientWidth, outer.clientHeight * 2);
    inner.style.width  = w + 'px';
    inner.style.height = (w / 2) + 'px';
  }
  syncSize();
  window.addEventListener('resize', syncSize);

  // ── Region data ──────────────────────────────────────────────────────────
  // x = (lng+180)/360*1000   y = (90-lat)/180*500
  const regions = [
    { code: "euw",  name: "EUW",  x: 504, y: 122 },
    { code: "eune", name: "EUNE", x: 572, y: 104 },
    { code: "na",   name: "NA",   x: 257, y: 132 },
    { code: "kr",   name: "KR",   x: 830, y: 140 },
    { code: "jp",   name: "JP",   x: 900, y: 158 },
    { code: "br",   name: "BR",   x: 371, y: 315 },
    { code: "lan",  name: "LAN",  x: 224, y: 196 },
    { code: "las",  name: "LAS",  x: 336, y: 348 },
    { code: "oce",  name: "OCE",  x: 922, y: 345 },
    { code: "tr",   name: "TR",   x: 581, y: 142 },
    { code: "ru",   name: "RU",   x: 619, y: 94  },
  ];

  const CW = 58, CH = 32, STEM = 10;

  // ── Build SVG pin card ───────────────────────────────────────────────────
  function makeMarker(r) {
    const { x: cx, y: cy, name, code } = r;
    const rx = cx - CW / 2;
    const ry = cy - CH - STEM;
    const g  = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('id', `pin-${code}`);
    g.innerHTML = `
      <rect id="bg-${code}" x="${rx}" y="${ry}" width="${CW}" height="${CH}" rx="3"
            fill="#090f1e" fill-opacity="0.92" stroke="#1e3050" stroke-width="0.8"/>
      <line x1="${rx+8}" y1="${ry}" x2="${rx+CW-8}" y2="${ry}"
            stroke="#c89b3c" stroke-width="0.9" stroke-opacity="0.9"/>
      <text x="${cx}" y="${ry+11.5}" text-anchor="middle" dominant-baseline="middle"
            font-family="Orbitron,sans-serif" font-size="5.8" font-weight="700"
            fill="#c89b3c" letter-spacing="1.4">${name}</text>
      <text x="${cx}" y="${ry+23}" text-anchor="middle" dominant-baseline="middle"
            font-family="Rajdhani,sans-serif" font-size="10" font-weight="600"
            fill="#4cafef" filter="url(#glow-s)"
            id="ver-${code}">…</text>
      <line x1="${cx}" y1="${cy-STEM}" x2="${cx}" y2="${cy-3.5}"
            stroke="#c89b3c" stroke-width="0.7" stroke-opacity="0.55"/>
      <circle cx="${cx}" cy="${cy}" r="3.2" fill="#4cafef" filter="url(#glow)"/>
      <!-- "NEW" badge, hidden by default -->
      <rect id="newbadge-${code}" x="${rx+CW-18}" y="${ry-7}" width="20" height="9" rx="2"
            fill="#c89b3c" opacity="0" filter="url(#glow-gold)"/>
      <text id="newlabel-${code}" x="${rx+CW-8}" y="${ry-2.5}" text-anchor="middle" dominant-baseline="middle"
            font-family="Orbitron,sans-serif" font-size="4.5" font-weight="900"
            fill="#060a12" opacity="0">NEW</text>
    `;
    return g;
  }

  // ── Flash animation when a version changes ───────────────────────────────
  function flashNewVersion(code) {
    // Border glow
    const bg = document.getElementById(`bg-${code}`);
    if (bg) {
      bg.setAttribute('stroke', '#c89b3c');
      bg.setAttribute('stroke-width', '1.5');
      setTimeout(() => {
        bg.setAttribute('stroke', '#1e3050');
        bg.setAttribute('stroke-width', '0.8');
      }, 8000);
    }
    // "NEW" badge: fade in, hold, fade out
    ['newbadge', 'newlabel'].forEach(prefix => {
      const el = document.getElementById(`${prefix}-${code}`);
      if (!el) return;
      el.setAttribute('opacity', '1');
      setTimeout(() => el.setAttribute('opacity', '0'), 8000);
    });
  }

  // ── Fetch one region ─────────────────────────────────────────────────────
  async function getVersion(code) {
    // Cache-bust so the browser doesn't return a stale response
    const res = await fetch(
      `https://ddragon.leagueoflegends.com/realms/${code}.json?_=${Date.now()}`
    );
    if (!res.ok) throw new Error(res.status);
    return (await res.json()).v;
  }

  // ── State: current known versions ────────────────────────────────────────
  const known = {};   // code → version string

  // ── Refresh all regions ──────────────────────────────────────────────────
  async function refresh(isFirst = false) {
    const sdot     = document.getElementById('sdot');
    const statusEl = document.getElementById('status-text');

    sdot.classList.add('loading');
    if (!isFirst) statusEl.textContent = 'Comprobando versiones…';

    let updated = 0, errors = 0, done = 0;

    await Promise.all(regions.map(async r => {
      try {
        const v  = await getVersion(r.code);
        const el = document.getElementById(`ver-${r.code}`);
        if (el) {
          const changed = known[r.code] && known[r.code] !== v;
          if (changed) {
            flashNewVersion(r.code);
            updated++;
          }
          known[r.code] = v;
          el.textContent = v;
          el.setAttribute('fill', '#4cafef'); // reset in case of previous error
        }
      } catch {
        errors++;
        const el = document.getElementById(`ver-${r.code}`);
        if (el) el.setAttribute('fill', '#e05050');
      }
      done++;
      if (isFirst) statusEl.textContent = `Cargando… ${done}/${regions.length}`;
    }));

    sdot.classList.remove('loading');

    if (isFirst) {
      statusEl.textContent = `${regions.length} regiones cargadas`;
    } else if (updated > 0) {
      statusEl.textContent = `¡${updated} región${updated > 1 ? 'es' : ''} actualizada${updated > 1 ? 's' : ''}!`;
    } else {
      statusEl.textContent = errors > 0
        ? `${errors} error${errors > 1 ? 'es' : ''} de red`
        : 'Sin cambios de versión';
    }

    document.getElementById('last-updated').textContent =
      'Última comprobación: ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // ── Countdown ticker in footer ───────────────────────────────────────────
  const REFRESH_MS = 20 * 60 * 1000; // 20 minutes
  let nextRefreshAt = Date.now() + REFRESH_MS;

  function startCountdown() {
    const el = document.getElementById('next-refresh');
    setInterval(() => {
      const secs = Math.max(0, Math.round((nextRefreshAt - Date.now()) / 1000));
      const m = String(Math.floor(secs / 60)).padStart(2, '0');
      const s = String(secs % 60).padStart(2, '0');
      el.textContent = `Próxima comprobación: ${m}:${s}`;
    }, 1000);
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  async function init() {
    const markersG = document.getElementById('markers');
    regions.forEach(r => markersG.appendChild(makeMarker(r)));

    // First load
    await refresh(true);

    // Auto-refresh every 5 minutes
    startCountdown();
    setInterval(async () => {
      nextRefreshAt = Date.now() + REFRESH_MS;
      await refresh(false);
    }, REFRESH_MS);
  }

  init();
</script>
</body>
</html>
