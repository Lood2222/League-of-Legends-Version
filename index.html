<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>LoL — Patch Versions</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060a12;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border-bottom: 1px solid #1a2d4a;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c89b3c, transparent);
    }
    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: .15em;
      color: #c89b3c;
      text-shadow: 0 0 20px #c89b3c44;
    }
    header h1 span { color: #4cafef; }

    .map-outer {
      flex: 1;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 60%, #0b1e3a18, #060a12);
    }

    /* The SVG fills the outer div entirely — D3 handles the projection */
    #map-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Land & borders */
    .land    { fill: #1a2a3a; stroke: #2a4060; stroke-width: 0.4; }
    .borders { fill: none;    stroke: #111d2d; stroke-width: 0.3; }
    .graticule { fill: none; stroke: #4a8fd1; stroke-opacity: 0.07; stroke-width: 0.5; }

    /* Pin cards are foreignObject → HTML inside SVG */
    .pin-card {
      background: #090f1eeb;
      border: 1px solid #1e3050;
      border-radius: 5px;
      padding: 3px 8px 4px;
      text-align: center;
      min-width: 58px;
      position: relative;
      overflow: visible;
      backdrop-filter: blur(4px);
    }
    .pin-card::before {
      content: '';
      position: absolute;
      top: 0; left: 12%; right: 12%; height: 1px;
      background: linear-gradient(90deg, transparent, #c89b3c, transparent);
    }
    .pin-region {
      font-family: 'Orbitron', sans-serif;
      font-size: 6px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #c89b3c;
      line-height: 1.4;
    }
    .pin-version {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: #4cafef;
      text-shadow: 0 0 8px #4cafef88;
      line-height: 1.3;
    }
    .pin-version.loading { animation: pulse 1s ease infinite; color: #2a3d52; text-shadow: none; }
    .pin-version.updated { color: #c89b3c; text-shadow: 0 0 10px #c89b3caa; }

    footer {
      flex-shrink: 0;
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .72rem;
      color: #3a5070;
      border-top: 1px solid #0d1a2a;
      letter-spacing: .06em;
    }
    .sdot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #2a9d4f; box-shadow: 0 0 6px #2a9d4f;
      flex-shrink: 0;
    }
    .sdot.loading { animation: pulse 1s ease infinite; background: #c89b3c; box-shadow: 0 0 6px #c89b3c; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>

<header>
  <h1>League of Legends — <span>Live Patch Versions</span></h1>
</header>

<div class="map-outer" id="outer">
  <svg id="map-svg"></svg>
</div>

<footer>
  <div class="sdot" id="sdot"></div>
  <span id="status-text">Cargando mapa…</span>
  <span style="margin-left:auto;color:#2a4a3a" id="next-refresh"></span>
  <span style="margin-left:16px" id="last-updated"></span>
</footer>

<script>
  // ── Region definitions: real server datacenter coordinates ────────────────
  const regions = [
    { code: "euw",  name: "EUW",  lng:   8.68, lat: 50.11 }, // Frankfurt
    { code: "eune", name: "EUNE", lng:  18.07, lat: 52.23 }, // Warsaw
    { code: "na",   name: "NA",   lng: -87.63, lat: 41.88 }, // Chicago
    { code: "kr",   name: "KR",   lng: 126.97, lat: 37.56 }, // Seoul
    { code: "jp",   name: "JP",   lng: 139.69, lat: 35.68 }, // Tokyo
    { code: "br",   name: "BR",   lng: -46.63, lat: -23.55 }, // São Paulo
    { code: "lan",  name: "LAN",  lng: -99.13, lat: 19.43 }, // Mexico City
    { code: "las",  name: "LAS",  lng: -58.38, lat: -34.60 }, // Buenos Aires
    { code: "oce",  name: "OCE",  lng: 151.20, lat: -33.86 }, // Sydney
    { code: "tr",   name: "TR",   lng:  32.86, lat: 39.93 }, // Ankara
    { code: "ru",   name: "RU",   lng:  37.61, lat: 55.75 }, // Moscow
  ];

  const known = {};  // code → version string

  // Card size in pixels (fixed — doesn't scale with map)
  const CW = 66, CH = 34, STEM = 10, DOT = 5;

  const svg    = d3.select('#map-svg');
  const outer  = document.getElementById('outer');
  let projection, pathGen;

  // ── Build / rebuild everything when window resizes ────────────────────────
  function buildMap(geo) {
    const W = outer.clientWidth;
    const H = outer.clientHeight;

    svg.attr('viewBox', `0 0 ${W} ${H}`);

    // Equirectangular projection fitted to our SVG size
    projection = d3.geoEquirectangular()
      .fitSize([W, H], { type: 'Sphere' });

    pathGen = d3.geoPath(projection);

    svg.selectAll('*').remove();

    // Background ocean
    svg.append('rect')
       .attr('width', W).attr('height', H)
       .attr('fill', '#08111e');

    // Graticule (grid lines)
    const graticule = d3.geoGraticule().step([30, 30]);
    svg.append('path')
       .datum(graticule())
       .attr('class', 'graticule')
       .attr('d', pathGen);

    // Equator highlighted slightly
    svg.append('path')
       .datum({ type: 'LineString', coordinates: [[-180, 0], [180, 0]] })
       .attr('fill', 'none')
       .attr('stroke', '#4a8fd1')
       .attr('stroke-opacity', 0.15)
       .attr('stroke-width', 0.7)
       .attr('d', pathGen);

    // Countries
    const countries = topojson.feature(geo, geo.objects.countries);
    svg.append('g')
       .selectAll('path')
       .data(countries.features)
       .join('path')
       .attr('class', 'land')
       .attr('d', pathGen);

    // Country borders
    svg.append('path')
       .datum(topojson.mesh(geo, geo.objects.countries, (a, b) => a !== b))
       .attr('class', 'borders')
       .attr('d', pathGen);

    // ── Pins ──────────────────────────────────────────────────────────────
    const pinsG = svg.append('g').attr('id', 'pins');

    regions.forEach(r => {
      const [px, py] = projection([r.lng, r.lat]);

      const g = pinsG.append('g')
        .attr('id', `pin-${r.code}`)
        .attr('transform', `translate(${px},${py})`);

      // Stem
      g.append('line')
        .attr('x1', 0).attr('y1', -DOT)
        .attr('x2', 0).attr('y2', -(DOT + STEM))
        .attr('stroke', '#c89b3c').attr('stroke-width', 0.8).attr('stroke-opacity', 0.6);

      // Card via foreignObject so we can use HTML/CSS for text rendering
      const fo = g.append('foreignObject')
        .attr('x', -CW / 2)
        .attr('y', -(DOT + STEM + CH))
        .attr('width', CW)
        .attr('height', CH);

      const div = fo.append('xhtml:div').attr('class', 'pin-card');
      div.append('xhtml:div').attr('class', 'pin-region').text(r.name);
      div.append('xhtml:div')
         .attr('class', 'pin-version loading')
         .attr('id', `ver-${r.code}`)
         .text('…');

      // Dot
      g.append('circle')
        .attr('r', DOT)
        .attr('fill', '#4cafef')
        .style('filter', 'drop-shadow(0 0 4px #4cafef)');
    });
  }

  // ── Version fetching ──────────────────────────────────────────────────────
  async function getVersion(code) {
    const res = await fetch(
      `https://ddragon.leagueoflegends.com/realms/${code}.json?_=${Date.now()}`
    );
    if (!res.ok) throw new Error(res.status);
    return (await res.json()).v;
  }

  async function refresh(isFirst = false) {
    const sdot     = document.getElementById('sdot');
    const statusEl = document.getElementById('status-text');

    sdot.classList.add('loading');
    if (!isFirst) statusEl.textContent = 'Comprobando versiones…';

    let updated = 0, errors = 0, done = 0;

    await Promise.all(regions.map(async r => {
      try {
        const v  = await getVersion(r.code);
        const el = document.getElementById(`ver-${r.code}`);
        if (el) {
          const changed = known[r.code] && known[r.code] !== v;
          if (changed) { updated++; el.classList.add('updated'); setTimeout(() => el.classList.remove('updated'), 10000); }
          known[r.code] = v;
          el.textContent = v;
          el.classList.remove('loading');
        }
      } catch {
        errors++;
        const el = document.getElementById(`ver-${r.code}`);
        if (el) { el.textContent = 'N/A'; el.classList.remove('loading'); el.style.color = '#e05050'; }
      }
      done++;
      if (isFirst) statusEl.textContent = `Cargando… ${done}/${regions.length}`;
    }));

    sdot.classList.remove('loading');

    if (isFirst) {
      statusEl.textContent = `${regions.length} regiones cargadas`;
    } else if (updated > 0) {
      statusEl.textContent = `¡${updated} región${updated > 1 ? 'es' : ''} actualizada${updated > 1 ? 's' : ''}!`;
    } else {
      statusEl.textContent = errors > 0 ? `${errors} error${errors > 1 ? 'es' : ''} de red` : 'Sin cambios de versión';
    }

    document.getElementById('last-updated').textContent =
      'Última comprobación: ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // ── Countdown ─────────────────────────────────────────────────────────────
  const REFRESH_MS = 5 * 60 * 1000;
  let nextRefreshAt = Date.now() + REFRESH_MS;

  function startCountdown() {
    const el = document.getElementById('next-refresh');
    setInterval(() => {
      const secs = Math.max(0, Math.round((nextRefreshAt - Date.now()) / 1000));
      const m = String(Math.floor(secs / 60)).padStart(2, '0');
      const s = String(secs % 60).padStart(2, '0');
      el.textContent = `Próxima comprobación: ${m}:${s}`;
    }, 1000);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  async function init() {
    const statusEl = document.getElementById('status-text');

    // Load world topology
    const geo = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    buildMap(geo);

    // Rebuild on resize (debounced)
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => buildMap(geo), 100);
    });

    // Load versions
    await refresh(true);

    // Auto-refresh
    startCountdown();
    setInterval(async () => {
      nextRefreshAt = Date.now() + REFRESH_MS;
      await refresh(false);
    }, REFRESH_MS);
  }

  init();
</script>
</body>
</html>
