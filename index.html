<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>LoL — Patch Versions</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060a12;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid #1a2d4a;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c89b3c, transparent);
    }
    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: .15em;
      color: #c89b3c;
      text-shadow: 0 0 20px #c89b3c44;
    }
    header h1 span { color: #4cafef; }

    .map-outer {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 60%, #0b1e3a22, #060a12);
    }

    /*
      map-inner: fixed pixel size computed in JS so it's always 2:1
      and fits inside the available area. Both children fill it 100x100%,
      so they share the exact same coordinate space — no misalignment on resize.
    */
    .map-inner {
      position: relative;
      flex-shrink: 0;
    }

    .world-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      opacity: 0.22;
      filter: hue-rotate(205deg) saturate(0.45) brightness(0.75);
      pointer-events: none;
    }

    /*
      SVG overlay with preserveAspectRatio="none":
      viewBox 0 0 1000 500 maps exactly onto the div's pixels.
      Pins at (x,y) always land on the same map pixel regardless of window size.
    */
    .pins-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    footer {
      flex-shrink: 0;
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .72rem;
      color: #3a5070;
      border-top: 1px solid #0d1a2a;
      letter-spacing: .06em;
    }
    .sdot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #2a9d4f; box-shadow: 0 0 6px #2a9d4f;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .ver-loading { animation: pulse 1s ease infinite; }
  </style>
</head>
<body>

<header>
  <h1>League of Legends — <span>Live Patch Versions</span></h1>
</header>

<div class="map-outer" id="outer">
  <div class="map-inner" id="mapinner">

    <!-- Equirectangular world map (native 2:1 ratio matches our projection formula) -->
    <img class="world-img"
         src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/World_map_-_low_resolution.svg/2000px-World_map_-_low_resolution.svg.png"
         alt=""/>

    <!--
      viewBox="0 0 1000 500" + preserveAspectRatio="none":
      SVG unit (x, y) → pixel (x/1000·W, y/500·H).

      Pin positions use equirectangular projection:
        x = (lng + 180) / 360 × 1000
        y = (90 − lat) / 180 × 500
    -->
    <svg class="pins-layer"
         viewBox="0 0 1000 500"
         preserveAspectRatio="none"
         xmlns="http://www.w3.org/2000/svg">

      <defs>
        <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-s" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="1.2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Latitude grid lines -->
      <g stroke="#4a8fd1" stroke-opacity="0.08" stroke-width="0.6" stroke-dasharray="4 6">
        <line x1="0" y1="83"  x2="1000" y2="83"/>   <!-- 60°N -->
        <line x1="0" y1="167" x2="1000" y2="167"/>  <!-- 30°N -->
        <line x1="0" y1="250" x2="1000" y2="250" stroke-opacity="0.15"/>  <!-- Equator -->
        <line x1="0" y1="333" x2="1000" y2="333"/>  <!-- 30°S -->
        <line x1="0" y1="417" x2="1000" y2="417"/>  <!-- 60°S -->
      </g>
      <!-- Longitude grid lines -->
      <g stroke="#4a8fd1" stroke-opacity="0.08" stroke-width="0.6" stroke-dasharray="4 6">
        <line x1="167" y1="0" x2="167" y2="500"/>   <!-- -120° -->
        <line x1="333" y1="0" x2="333" y2="500"/>   <!-- -60° -->
        <line x1="500" y1="0" x2="500" y2="500" stroke-opacity="0.15"/>   <!-- 0° -->
        <line x1="667" y1="0" x2="667" y2="500"/>   <!-- 60°E -->
        <line x1="833" y1="0" x2="833" y2="500"/>   <!-- 120°E -->
      </g>

      <!-- Markers injected by JS -->
      <g id="markers"></g>

    </svg>
  </div>
</div>

<footer>
  <div class="sdot"></div>
  <span id="status-text">Cargando versiones…</span>
  <span style="margin-left:auto" id="last-updated"></span>
</footer>

<script>
  // ── Keep map-inner sized to 2:1, fitting the available area ─────────────
  const outer = document.getElementById('outer');
  const inner = document.getElementById('mapinner');

  function syncSize() {
    const maxW = outer.clientWidth;
    const maxH = outer.clientHeight;
    // width is constrained by either the available width or 2× the height
    const w = Math.min(maxW, maxH * 2);
    inner.style.width  = w + 'px';
    inner.style.height = (w / 2) + 'px';
  }
  syncSize();
  window.addEventListener('resize', syncSize);

  // ── Region definitions ───────────────────────────────────────────────────
  // x = (lng + 180) / 360 * 1000
  // y = (90 − lat) / 180 * 500
  // Small nudges applied to EUW/EUNE, KR/JP, TR/RU to avoid card overlap.
  const regions = [
    { code: "euw",  name: "EUW",  x: 504, y: 122 }, // Frankfurt (50.1°N,  8.7°E)
    { code: "eune", name: "EUNE", x: 572, y: 104 }, // Warsaw    (52.2°N, 21.0°E)
    { code: "na",   name: "NA",   x: 257, y: 132 }, // Chicago   (41.9°N, 87.6°W)
    { code: "kr",   name: "KR",   x: 830, y: 140 }, // Seoul     (37.6°N,127.0°E)
    { code: "jp",   name: "JP",   x: 900, y: 158 }, // Tokyo     (35.7°N,139.7°E)
    { code: "br",   name: "BR",   x: 371, y: 315 }, // São Paulo (23.6°S, 46.6°W)
    { code: "lan",  name: "LAN",  x: 224, y: 196 }, // Mex. City (19.4°N, 99.1°W)
    { code: "las",  name: "LAS",  x: 336, y: 348 }, // Bs. Aires (34.6°S, 58.4°W)
    { code: "oce",  name: "OCE",  x: 922, y: 345 }, // Sydney    (33.9°S,151.2°E)
    { code: "tr",   name: "TR",   x: 581, y: 142 }, // Istanbul  (41.0°N, 29.0°E)
    { code: "ru",   name: "RU",   x: 619, y: 94  }, // Moscow    (55.8°N, 37.6°E)
  ];

  // ── SVG card dimensions (in viewBox units = SVG units) ──────────────────
  const CW = 58, CH = 32, STEM = 10;

  function makeMarker(r) {
    const { x: cx, y: cy, name, code } = r;
    const rx = cx - CW / 2;
    const ry = cy - CH - STEM;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.innerHTML = `
      <rect x="${rx}" y="${ry}" width="${CW}" height="${CH}" rx="3"
            fill="#090f1e" fill-opacity="0.92" stroke="#1e3050" stroke-width="0.8"/>
      <line x1="${rx+8}" y1="${ry}" x2="${rx+CW-8}" y2="${ry}"
            stroke="#c89b3c" stroke-width="0.9" stroke-opacity="0.9"/>
      <text x="${cx}" y="${ry+11.5}" text-anchor="middle" dominant-baseline="middle"
            font-family="Orbitron,sans-serif" font-size="5.8" font-weight="700"
            fill="#c89b3c" letter-spacing="1.4">${name}</text>
      <text x="${cx}" y="${ry+23}" text-anchor="middle" dominant-baseline="middle"
            font-family="Rajdhani,sans-serif" font-size="10" font-weight="600"
            fill="#4cafef" filter="url(#glow-s)"
            id="ver-${code}" class="ver-loading">…</text>
      <line x1="${cx}" y1="${cy-STEM}" x2="${cx}" y2="${cy-3.5}"
            stroke="#c89b3c" stroke-width="0.7" stroke-opacity="0.55"/>
      <circle cx="${cx}" cy="${cy}" r="3.2" fill="#4cafef" filter="url(#glow)"/>
    `;
    return g;
  }

  // ── Fetch versions in parallel ───────────────────────────────────────────
  async function getVersion(code) {
    const res = await fetch(`https://ddragon.leagueoflegends.com/realms/${code}.json`);
    return (await res.json()).v;
  }

  async function init() {
    const markersG  = document.getElementById('markers');
    const statusEl  = document.getElementById('status-text');

    // Render all pins immediately with loading placeholder
    regions.forEach(r => markersG.appendChild(makeMarker(r)));

    let done = 0;
    await Promise.all(regions.map(async r => {
      try {
        const v  = await getVersion(r.code);
        const el = document.getElementById(`ver-${r.code}`);
        if (el) { el.textContent = v; el.classList.remove('ver-loading'); }
      } catch {
        const el = document.getElementById(`ver-${r.code}`);
        if (el) {
          el.textContent = 'N/A';
          el.classList.remove('ver-loading');
          el.setAttribute('fill', '#e05050');
        }
      }
      statusEl.textContent = `Cargando… ${++done}/${regions.length}`;
    }));

    statusEl.textContent = `${regions.length} regiones cargadas`;
    document.getElementById('last-updated').textContent =
      'Actualizado ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  init();
</script>
</body>
</html>
