<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>LoL — Patch Versions</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060a12;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border-bottom: 1px solid #1a2d4a;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #ffc107, transparent);
    }
    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: .15em;
      color: #ffc107;
      text-shadow: 0 0 20px #ffc107, 0 0 30px #ff9800;
    }
    header h1 span { color: #00d4ff; text-shadow: 0 0 15px #00d4ff; }

    .map-outer {
      flex: 1;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 60%, #0b1e3a18, #060a12);
    }

    #map-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .land     { fill: #0d1420; stroke: #1a3a52; stroke-width: 0.6; }
    .borders  { fill: none;    stroke: #1a3a52; stroke-width: 0.5; stroke-opacity: 0.7; }
    .graticule { fill: none; stroke: #1a3a5a; stroke-opacity: 0.12; stroke-width: 0.5; }

    .pin-card {
      background: #090f1eeb;
      border: 1px solid #1e3050;
      border-radius: 5px;
      padding: 3px 8px 4px;
      text-align: center;
      min-width: 58px;
      position: relative;
      overflow: visible;
    }
    .pin-card::before {
      content: '';
      position: absolute;
      top: 0; left: 12%; right: 12%; height: 1px;
      background: linear-gradient(90deg, transparent, #ffc107, transparent);
    }
    .pin-region {
      font-family: 'Orbitron', sans-serif;
      font-size: 6px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #ffc107;
      text-shadow: 0 0 12px #ffc107, 0 0 20px #ff9800;
      line-height: 1.4;
    }
    .pin-version {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: #00d4ff;
      text-shadow: 0 0 12px #00d4ff, 0 0 20px #0088ff;
      line-height: 1.3;
    }
    .pin-version.loading { animation: pulse 1s ease infinite; color: #2a3d52; text-shadow: none; }
    .pin-version.updated { color: #ffc107; text-shadow: 0 0 12px #ffc107, 0 0 20px #ff9800; }

    footer {
      flex-shrink: 0;
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .72rem;
      color: #3a5070;
      border-top: 1px solid #0d1a2a;
      letter-spacing: .06em;
    }
    .sdot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #2a9d4f; box-shadow: 0 0 6px #2a9d4f;
      flex-shrink: 0;
    }
    .sdot.loading { animation: pulse 1s ease infinite; background: #c89b3c; box-shadow: 0 0 6px #c89b3c; }

    .patch-notes-btn {
      padding: 4px 12px;
      background: linear-gradient(135deg, #ffc107, #ff9800);
      color: #0a1020;
      border: none;
      border-radius: 3px;
      font-family: 'Rajdhani', sans-serif;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 8px rgba(255, 193, 7, 0.3);
      text-transform: uppercase;
      display: inline-block;
    }
    .patch-notes-btn:hover {
      background: linear-gradient(135deg, #00d4ff, #0088ff);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
      transform: translateY(-1px);
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .country-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .country-modal.active { display: flex; }
    .country-modal-content {
      background: #0a1020;
      border: 2px solid #ffc107;
      border-radius: 8px;
      padding: 30px;
      max-width: 500px;
      box-shadow: 0 0 30px #ffc10744;
    }
    .country-modal-header {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      color: #ffc107;
      text-shadow: 0 0 12px #ffc107;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #1a3a52;
    }
    .country-modal-row {
      display: flex;
      justify-content: space-between;
      margin: 14px 0;
      font-size: 1.1rem;
    }
    .country-modal-label {
      color: #00d4ff;
      font-weight: 600;
    }
    .country-modal-value {
      color: #ffc107;
      text-align: right;
      max-width: 50%;
    }
    .country-modal-close {
      margin-top: 20px;
      padding: 12px 25px;
      background: #ffc107;
      color: #0a1020;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      font-family: 'Rajdhani', sans-serif;
      transition: all 0.2s;
    }
    .country-modal-close:hover {
      background: #00d4ff;
      box-shadow: 0 0 15px #00d4ff;
    }

    .land { cursor: pointer; transition: fill 0.2s; }
    .land:hover { fill: #1a2a40 !important; }
  </style>
</head>
<body>

<header>
  <h1>League of Legends — <span>Live Patch Versions</span></h1>
</header>

<div class="map-outer" id="outer">
  <svg id="map-svg"></svg>
</div>

<footer>
  <div class="sdot" id="sdot"></div>
  <span id="status-text">Cargando mapa…</span>
  <span style="margin-left:auto;color:#2a4a3a" id="next-refresh"></span>
  <span style="margin-left:16px" id="last-updated"></span>
  <a href="https://www.leagueoflegends.com/es-es/news/tags/patch-notes/" target="_blank" class="patch-notes-btn" id="patch-notes-btn">📋 Patch Notes</a>
</footer>

<div class="country-modal" id="country-modal">
  <div class="country-modal-content">
    <div class="country-modal-header" id="modal-country"></div>
    <div class="country-modal-row">
      <span class="country-modal-label">Región:</span>
      <span class="country-modal-value" id="modal-region">—</span>
    </div>
    <div class="country-modal-row">
      <span class="country-modal-label">Hora local:</span>
      <span class="country-modal-value" id="modal-time">—</span>
    </div>
    <div class="country-modal-row">
      <span class="country-modal-label">Versión:</span>
      <span class="country-modal-value" id="modal-version">—</span>
    </div>
    <button class="country-modal-close" onclick="document.getElementById('country-modal').classList.remove('active')">Cerrar</button>
  </div>
</div>

<script>
  // ── Region definitions ────────────────────────────────────────────────────
  const regions = [
    { code: "euw",  name: "EUW",  lng:   8.68, lat: 50.11, offset: { dx: -75, dy: -70 } },
    { code: "eune", name: "EUNE", lng:  18.07, lat: 52.23, offset: { dx:  10, dy: -80 } },
    { code: "ru",   name: "RU",   lng:  37.61, lat: 55.75, offset: { dx:  75, dy: -70 } },
    { code: "tr",   name: "TR",   lng:  32.86, lat: 39.93, offset: { dx:  10, dy:  70 } },
    { code: "na",   name: "NA",   lng: -87.63, lat: 41.88, offset: { dx: -75, dy: -70 } },
    { code: "kr",   name: "KR",   lng: 126.97, lat: 37.56, offset: { dx:  75, dy: -70 } },
    { code: "jp",   name: "JP",   lng: 139.69, lat: 35.68, offset: { dx:  70, dy: -70 } },
    { code: "br",   name: "BR",   lng: -46.63, lat: -23.55, offset: { dx: -65, dy: -70 } },
    { code: "lan",  name: "LAN",  lng: -99.13, lat: 19.43, offset: { dx:  10, dy: -80 } },
    { code: "las",  name: "LAS",  lng: -58.38, lat: -34.60, offset: { dx:  75, dy:  70 } },
    { code: "oce",  name: "OCE",  lng: 151.20, lat: -33.86, offset: { dx:  70, dy: -70 } },
  ];

  const known = {};
  const CW = 66, CH = 34, DOT = 5;

  const svg   = d3.select('#map-svg');
  const outer = document.getElementById('outer');
  let projection;

  // ── Country to Region mapping ──────────────────────────────────────────────
  const countryToRegion = {
    '826': 'EUW', '250': 'EUW', '276': 'EUW', '724': 'EUW', '380': 'EUW', '528': 'EUW', '56': 'EUW', '40': 'EUW', '756': 'EUW', '442': 'EUW', '208': 'EUW', '752': 'EUW', '578': 'EUW', '620': 'EUW', '372': 'EUW', '300': 'EUW', '203': 'EUW', '348': 'EUW', '642': 'EUW', '191': 'EUW', '070': 'EUW', '688': 'EUW',
    '616': 'EUNE', '804': 'EUNE', '100': 'EUNE', '008': 'EUNE', '807': 'EUNE', '705': 'EUNE', '703': 'EUNE',
    '643': 'RU',
    '792': 'TR', '196': 'TR',
    '840': 'NA', '124': 'NA', '484': 'NA',
    '320': 'LAN', '222': 'LAN', '340': 'LAN', '558': 'LAN', '188': 'LAN', '591': 'LAN',
    '076': 'BR',
    '032': 'LAS', '152': 'LAS', '170': 'LAS', '218': 'LAS', '600': 'LAS', '858': 'LAS', '862': 'LAS', '604': 'LAS', '068': 'LAS',
    '410': 'KR', '156': 'KR', '158': 'KR',
    '392': 'JP',
    '036': 'OCE', '554': 'OCE',
  };

  const countryTimezone = {
    '826': 'Europe/London', '250': 'Europe/Paris', '276': 'Europe/Berlin', '724': 'Europe/Madrid', '380': 'Europe/Rome', '528': 'Europe/Amsterdam', '56': 'Europe/Brussels', '40': 'Europe/Vienna', '756': 'Europe/Zurich', '442': 'Europe/Luxembourg', '208': 'Europe/Copenhagen', '752': 'Europe/Stockholm', '578': 'Europe/Oslo', '620': 'Europe/Lisbon', '372': 'Europe/Dublin', '300': 'Europe/Athens', '203': 'Europe/Prague', '348': 'Europe/Budapest', '642': 'Europe/Bucharest', '191': 'Europe/Zagreb', '070': 'Europe/Sarajevo', '688': 'Europe/Belgrade',
    '616': 'Europe/Warsaw', '804': 'Europe/Kyiv', '100': 'Europe/Sofia', '008': 'Europe/Tirane', '807': 'Europe/Skopje', '705': 'Europe/Ljubljana', '703': 'Europe/Bratislava',
    '643': 'Europe/Moscow',
    '792': 'Europe/Istanbul', '196': 'Europe/Istanbul',
    '840': 'America/Chicago', '124': 'America/Toronto', '484': 'America/Mexico_City',
    '320': 'America/Guatemala', '222': 'America/El_Salvador', '340': 'America/Tegucigalpa', '558': 'America/Managua', '188': 'America/Costa_Rica', '591': 'America/Panama',
    '076': 'America/Sao_Paulo',
    '032': 'America/Argentina/Buenos_Aires', '152': 'America/Santiago', '170': 'America/Bogota', '218': 'America/Guayaquil', '600': 'America/Asuncion', '858': 'America/Montevideo', '862': 'America/Caracas', '604': 'America/Lima', '068': 'America/La_Paz',
    '410': 'Asia/Seoul', '156': 'Asia/Shanghai', '158': 'Asia/Taipei',
    '392': 'Asia/Tokyo',
    '036': 'Australia/Sydney', '554': 'Pacific/Auckland',
  };

  const countryNames = {
    '826': 'Reino Unido', '250': 'Francia', '276': 'Alemania', '724': 'España', '380': 'Italia', '528': 'Países Bajos', '56': 'Bélgica', '40': 'Austria', '756': 'Suiza', '442': 'Luxemburgo', '208': 'Dinamarca', '752': 'Suecia', '578': 'Noruega', '620': 'Portugal', '372': 'Irlanda', '300': 'Grecia', '203': 'República Checa', '348': 'Hungría', '642': 'Rumania', '643': 'Eslovenia', '191': 'Croacia', '070': 'Bosnia', '688': 'Serbia',
    '616': 'Polonia', '804': 'Ucrania', '100': 'Bulgaria', '008': 'Albania', '807': 'Macedonia',
    '792': 'Turquía', '196': 'Chipre',
    '840': 'Estados Unidos', '124': 'Canadá', '484': 'México',
    '320': 'Guatemala', '222': 'El Salvador', '340': 'Honduras', '558': 'Nicaragua', '188': 'Costa Rica', '591': 'Panamá',
    '076': 'Brasil',
    '032': 'Argentina', '152': 'Chile', '170': 'Colombia', '218': 'Ecuador', '600': 'Paraguay', '858': 'Uruguay', '862': 'Venezuela', '604': 'Perú', '068': 'Bolivia',
    '410': 'Corea del Sur', '392': 'Japón', '036': 'Australia', '554': 'Nueva Zelanda',
  };

  const versionTimestamps = {};

  // ── DDragon → Patch display conversion ───────────────────────────────────
  // Riot rebranded in 2025: DDragon "15.x.x" = Patch "25.x", "16.x.x" = "26.x", etc.
  // (major + 10 = displayed year number)
  function toPatchDisplay(v) {
    const parts = (v || '').split('.');
    if (parts.length >= 2) {
      const major = parseInt(parts[0], 10);
      if (major >= 15) return `${major + 10}.${parts[1]}`;
    }
    return v; // fallback for old versions
  }

  function getLocalTimeForCountry(timestamp, timezone) {
    if (!timezone) return '—';
    try {
      const formatter = new Intl.DateTimeFormat('es-ES', {
        timeZone: timezone,
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        year: 'numeric', month: '2-digit', day: '2-digit'
      });
      return formatter.format(new Date(timestamp));
    } catch (e) { return '—'; }
  }

  // ── Draw map + pins ───────────────────────────────────────────────────────
  function buildMap(geo) {
    const W = outer.clientWidth;
    const H = outer.clientHeight;

    svg.attr('viewBox', `0 0 ${W} ${H}`);
    projection = d3.geoEquirectangular().fitSize([W, H], { type: 'Sphere' });
    const pathGen = d3.geoPath(projection);

    svg.selectAll('*').remove();

    svg.append('rect').attr('width', W).attr('height', H).attr('fill', '#030609');

    const graticule = d3.geoGraticule().step([30, 30]);
    svg.append('path').datum(graticule()).attr('class', 'graticule').attr('d', pathGen);

    svg.append('path')
      .datum({ type: 'LineString', coordinates: [[-180, 0], [180, 0]] })
      .attr('fill', 'none').attr('stroke', '#1a3a5a').attr('stroke-opacity', 0.2)
      .attr('stroke-width', 0.7).attr('d', pathGen);

    svg.append('g')
      .selectAll('path')
      .data(topojson.feature(geo, geo.objects.countries).features)
      .join('path')
      .attr('class', 'land')
      .attr('d', pathGen)
      .on('click', function(event, d) {
        event.stopPropagation();
        const countryId = String(d.id);
        const region = countryToRegion[countryId] || 'Desconocida';
        const timezone = countryTimezone[countryId];
        const rawVersion = known[region.toLowerCase()] || 'N/A';
        const displayVersion = rawVersion !== 'N/A' ? toPatchDisplay(rawVersion) : 'N/A';
        const countryName = countryNames[countryId] || `País ${countryId}`;

        let timeStr = '—';
        if (timezone) {
          try {
            timeStr = new Intl.DateTimeFormat('es-ES', {
              timeZone: timezone, hour: '2-digit', minute: '2-digit', second: '2-digit'
            }).format(new Date());
          } catch (e) { timeStr = 'N/A'; }
        }

        document.getElementById('modal-country').textContent = countryName;
        document.getElementById('modal-region').textContent = region;
        document.getElementById('modal-time').textContent = timeStr;
        document.getElementById('modal-version').textContent = displayVersion;
        document.getElementById('country-modal').classList.add('active');
      });

    svg.append('path')
      .datum(topojson.mesh(geo, geo.objects.countries, (a, b) => a !== b))
      .attr('class', 'borders').attr('d', pathGen);

    const pinsG = svg.append('g').attr('id', 'pins');

    regions.forEach(r => {
      const [px, py] = projection([r.lng, r.lat]);
      const dx = r.offset?.dx ?? 0;
      const dy = r.offset?.dy ?? -(DOT + 10 + CH);

      const cardCX = px + dx;
      const cardBY = py + dy;
      const lineEndX = cardCX;
      const lineEndY = cardBY + CH;

      const g = pinsG.append('g').attr('id', `pin-${r.code}`);

      if (r.offset) {
        const elbowY = py - DOT - 6;
        g.append('polyline')
          .attr('points', `${px},${py - DOT} ${px},${elbowY} ${lineEndX},${lineEndY}`)
          .attr('fill', 'none').attr('stroke', '#c89b3c')
          .attr('stroke-width', 0.8).attr('stroke-opacity', 0.55).attr('stroke-dasharray', '3 2');
        g.append('circle').attr('cx', px).attr('cy', elbowY)
          .attr('r', 1.2).attr('fill', '#c89b3c').attr('fill-opacity', 0.5);
      } else {
        g.append('line')
          .attr('x1', px).attr('y1', py - DOT)
          .attr('x2', lineEndX).attr('y2', lineEndY)
          .attr('stroke', '#c89b3c').attr('stroke-width', 0.8).attr('stroke-opacity', 0.6);
      }

      const fo = g.append('foreignObject')
        .attr('x', cardCX - CW / 2).attr('y', cardBY)
        .attr('width', CW).attr('height', CH);

      const div = fo.append('xhtml:div').attr('class', 'pin-card');
      div.append('xhtml:div').attr('class', 'pin-region').text(r.name);
      div.append('xhtml:div')
        .attr('class', 'pin-version loading')
        .attr('id', `ver-${r.code}`)
        .text('…');

      g.append('circle').attr('cx', px).attr('cy', py)
        .attr('r', DOT).attr('fill', '#4cafef')
        .style('filter', 'drop-shadow(0 0 4px #4cafef)');
    });
  }

  // ── Version fetching ──────────────────────────────────────────────────────
  async function getVersion(code) {
    const res = await fetch(
      `https://ddragon.leagueoflegends.com/realms/${code}.json?_=${Date.now()}`
    );
    if (!res.ok) throw new Error(res.status);
    return (await res.json()).v;
  }

  async function refresh(isFirst = false) {
    const sdot     = document.getElementById('sdot');
    const statusEl = document.getElementById('status-text');
    sdot.classList.add('loading');
    if (!isFirst) statusEl.textContent = 'Comprobando versiones…';

    let updated = 0, errors = 0, done = 0;
    let latestRawVersion = null;

    await Promise.all(regions.map(async r => {
      try {
        const v  = await getVersion(r.code);
        const el = document.getElementById(`ver-${r.code}`);
        if (el) {
          const changed = known[r.code] && known[r.code] !== v;
          if (changed) {
            updated++;
            el.classList.add('updated');
            setTimeout(() => el.classList.remove('updated'), 10000);
          }
          known[r.code] = v;
          versionTimestamps[r.code] = Date.now();
          // Show the user-friendly patch name (e.g. "26.7" instead of "16.7.1")
          el.textContent = toPatchDisplay(v);
          el.classList.remove('loading');

          if (r.code === 'euw' && !latestRawVersion) {
            latestRawVersion = v;
          }
        }
      } catch {
        errors++;
        const el = document.getElementById(`ver-${r.code}`);
        if (el) { el.textContent = 'N/A'; el.classList.remove('loading'); el.style.color = '#e05050'; }
      }
      done++;
      if (isFirst) statusEl.textContent = `Cargando… ${done}/${regions.length}`;
    }));

    // Update Patch Notes button with correct URL
    if (latestRawVersion) {
      const display = toPatchDisplay(latestRawVersion); // e.g. "26.7"
      const [maj, min] = display.split('.');
      const patchBtn = document.getElementById('patch-notes-btn');
      if (patchBtn) {
        // URL slug: "notas-de-la-version-26-7-de-league-of-legends"
        patchBtn.href = `https://www.leagueoflegends.com/es-es/news/game-updates/notas-de-la-version-${maj}-${min}-de-league-of-legends/`;
        patchBtn.title = `Ver notas del parche ${display}`;
        patchBtn.textContent = `📋 Patch ${display}`;
      }
    }

    sdot.classList.remove('loading');
    if (isFirst) {
      statusEl.textContent = `${regions.length} regiones cargadas`;
    } else if (updated > 0) {
      statusEl.textContent = `¡${updated} región${updated > 1 ? 'es' : ''} actualizada${updated > 1 ? 's' : ''}!`;
    } else {
      statusEl.textContent = errors > 0 ? `${errors} error${errors > 1 ? 'es' : ''} de red` : 'Sin cambios de versión';
    }
    document.getElementById('last-updated').textContent =
      'Última comprobación: ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // ── Countdown ─────────────────────────────────────────────────────────────
  const REFRESH_MS = 5 * 60 * 1000;
  let nextRefreshAt = Date.now() + REFRESH_MS;
  function startCountdown() {
    const el = document.getElementById('next-refresh');
    setInterval(() => {
      const secs = Math.max(0, Math.round((nextRefreshAt - Date.now()) / 1000));
      el.textContent = `Próxima comprobación: ${String(Math.floor(secs/60)).padStart(2,'0')}:${String(secs%60).padStart(2,'0')}`;
    }, 1000);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  async function init() {
    const geo = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    buildMap(geo);

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => buildMap(geo), 100);
    });

    await refresh(true);
    startCountdown();
    setInterval(async () => { nextRefreshAt = Date.now() + REFRESH_MS; await refresh(false); }, REFRESH_MS);
  }

  init();
</script>
</body>
</html>
